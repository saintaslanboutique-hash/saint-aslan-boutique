name: Deploy Fullstack App to VPS

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: deployment steps
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/saint-aslan-boutique
            
            git fetch --all
            git reset --hard origin/main
            git pull origin main
            
            # --- BACKEND GÜNCELLEMESİ ---
            cd server
            npm install --legacy-peer-deps
            pm2 restart saint-backend
            
            # --- FRONTEND GÜNCELLEMESİ ---
            cd ../client
            npm install --legacy-peer-deps
            npm install three @types/three
            npm run build
            pm2 restart saint-frontend
